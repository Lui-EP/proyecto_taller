upstream mercado_local_backend {
    server instancia-b:8010;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name mercado-local.ddns.net;

    location / {
        proxy_pass http://mercado_local_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name mercado-local.ddns.net;

    # Certificados de Let's Encrypt (ajusta rutas si tus nombres difieren)
    ssl_certificate /etc/letsencrypt/live/mercado-local.ddns.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mercado-local.ddns.net/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass http://mercado_local_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }
}
